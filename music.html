  <style>
    :root {
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --spring-soft: cubic-bezier(0.22, 1.2, 0.36, 1);
      --spring-out: cubic-bezier(0.6, -0.28, 0.735, 0.045);
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-bg-hover: rgba(255, 255, 255, 0.16);
      --glass-border: rgba(255, 255, 255, 0.14);
      --glass-highlight: rgba(255, 255, 255, 0.22);
    }

    /* Custom Scrollbar Style */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background-color: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background-color: rgba(255, 255, 255, 0.35);
    }

    /* Set default font */
    body {
      font-family: 'Montserrat', sans-serif;
      font-weight: 500;
      background-color: #000;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Audio Spectrum Animation — smoother, more organic */
    @keyframes spectrum1 {
      0%, 100% { height: 10px; }
      30% { height: 22px; }
      60% { height: 14px; }
    }
    @keyframes spectrum2 {
      0%, 100% { height: 22px; }
      40% { height: 8px; }
      70% { height: 26px; }
    }
    @keyframes spectrum3 {
      0%, 100% { height: 16px; }
      35% { height: 28px; }
      65% { height: 12px; }
    }

    .spectrum-bar1 { animation: spectrum1 0.9s cubic-bezier(0.45, 0, 0.55, 1) infinite; border-radius: 2px; }
    .spectrum-bar2 { animation: spectrum2 1.05s cubic-bezier(0.45, 0, 0.55, 1) infinite; border-radius: 2px; }
    .spectrum-bar3 { animation: spectrum3 0.85s cubic-bezier(0.45, 0, 0.55, 1) infinite; border-radius: 2px; }

    /* Loading Throbber Animation */
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loading-throbber {
      animation: rotate 1.5s linear infinite;
    }

    .loading-pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }

    /* Input Range Styling — taller hit area, glowing thumb */
    input[type="range"] {
      -webkit-appearance: none;
      height: 6px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      background-image: linear-gradient(90deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.75));
      background-size: 0% 100%;
      background-repeat: no-repeat;
      transition: height 0.25s var(--spring-soft);
    }
    input[type="range"]:hover {
      height: 8px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0), 0 2px 6px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s var(--spring), box-shadow 0.25s var(--spring-soft);
    }
    input[type="range"]:hover::-webkit-slider-thumb {
      transform: scale(1.3);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.15), 0 2px 10px rgba(0, 0, 0, 0.5);
    }
    input[type="range"]:active::-webkit-slider-thumb {
      transform: scale(1.45);
      box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.18), 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      transition: transform 0.25s var(--spring), box-shadow 0.25s var(--spring-soft);
    }
    input[type="range"]:hover::-moz-range-thumb {
      transform: scale(1.3);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.15), 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    /* Responsive adjustments */
    @media (max-width: 640px) {
      .mobile-scale {
        transform: scale(1.2);
        margin: 0.75rem 0;
      }
      .mobile-control-scale {
        transform: scale(1.3);
      }
    }

    /* Refined glass surface — layered gradient + inner highlight */
    .glass-surface {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.14) 0%, rgba(255, 255, 255, 0.04) 100%);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      border: 1px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        0 10px 40px rgba(0, 0, 0, 0.35);
    }

    .glass-btn {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.06) 100%);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid var(--glass-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.22),
        0 4px 14px rgba(0, 0, 0, 0.25);
    }

    /* Bouncy Button Animations — spring-driven */
    @keyframes spring-press {
      0%   { transform: scale(1); }
      35%  { transform: scale(0.88); }
      70%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) scale(1.05); }
      25% { transform: rotate(-6deg) scale(1.05); }
      75% { transform: rotate(6deg) scale(1.05); }
    }

    .btn-bounce {
      transition: transform 0.35s var(--spring), background-color 0.25s ease, box-shadow 0.25s var(--spring-soft);
      will-change: transform;
    }
    .btn-bounce:hover {
      transform: scale(1.08) translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 8px 22px rgba(0, 0, 0, 0.35);
    }
    .btn-bounce:active {
      animation: spring-press 0.45s var(--spring) both;
    }

    /* Bigger spring for the main play button */
    @keyframes spring-press-big {
      0%   { transform: scale(1); }
      30%  { transform: scale(0.82); }
      65%  { transform: scale(1.14); }
      100% { transform: scale(1); }
    }
    .btn-play-bounce { transition: transform 0.4s var(--spring), box-shadow 0.3s var(--spring-soft); will-change: transform; }
    .btn-play-bounce:hover { transform: scale(1.08) translateY(-1px); }
    .btn-play-bounce:active { animation: spring-press-big 0.55s var(--spring) both; }

    /* Pulsing ring under play button while playing */
    @keyframes play-ring {
      0%   { transform: scale(1);   opacity: 0.55; }
      80%  { transform: scale(1.45); opacity: 0; }
      100% { transform: scale(1.45); opacity: 0; }
    }
    .play-ring {
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      pointer-events: none;
      animation: play-ring 1.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .playlist-btn {
      transition: transform 0.35s var(--spring), background-color 0.25s ease, box-shadow 0.25s var(--spring-soft);
    }
    .playlist-btn:hover {
      animation: wiggle 0.7s var(--spring) both;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 8px 22px rgba(0, 0, 0, 0.35);
    }

    /* Track-change spring slide+fade — direction-aware */
    @keyframes card-in-forward {
      0%   { opacity: 0; transform: translateX(48px) scale(0.94); }
      70%  { opacity: 1; transform: translateX(-6px) scale(1.02); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes card-out-forward {
      0%   { opacity: 1; transform: translateX(0) scale(1); }
      100% { opacity: 0; transform: translateX(-48px) scale(0.94); }
    }
    @keyframes card-in-backward {
      0%   { opacity: 0; transform: translateX(-48px) scale(0.94); }
      70%  { opacity: 1; transform: translateX(6px) scale(1.02); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes card-out-backward {
      0%   { opacity: 1; transform: translateX(0) scale(1); }
      100% { opacity: 0; transform: translateX(48px) scale(0.94); }
    }
    .card-in-forward   { animation: card-in-forward   0.55s var(--spring) both; }
    .card-out-forward  { animation: card-out-forward  0.35s var(--spring-out) both; }
    .card-in-backward  { animation: card-in-backward  0.55s var(--spring) both; }
    .card-out-backward { animation: card-out-backward 0.35s var(--spring-out) both; }

    /* Playlist row enter stagger */
    @keyframes row-in {
      0%   { opacity: 0; transform: translateY(8px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .row-in { animation: row-in 0.35s var(--spring-soft) both; }

    .playlist-row {
      position: relative;
      transition: transform 0.3s var(--spring), background-color 0.25s ease;
    }
    .playlist-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 18%;
      bottom: 18%;
      width: 3px;
      border-radius: 999px;
      background: white;
      opacity: 0;
      transform: scaleY(0.3);
      transform-origin: center;
      transition: opacity 0.35s var(--spring-soft), transform 0.35s var(--spring);
    }
    .playlist-row:hover {
      transform: translateX(6px);
      background: rgba(255, 255, 255, 0.06);
    }
    .playlist-row.is-current::before {
      opacity: 1;
      transform: scaleY(1);
    }
    .playlist-row.is-current {
      background: linear-gradient(90deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.03) 100%);
    }

    /* Game-group header in playlist */
    .playlist-group-header {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      padding: 14px 4px 8px;
      font-weight: 600;
    }
    .playlist-group-header:first-child { padding-top: 4px; }

    /* Subtle entrance for the logo / header */
    @keyframes drop-in {
      0%   { opacity: 0; transform: translateY(-12px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    .drop-in { animation: drop-in 0.7s var(--spring) both; }

    /* Layered background crossfade */
    .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transition: opacity 0.9s ease;
      transform: scale(1.06);
    }
    .bg-layer > video,
    .bg-layer > img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>

    // Beat detection component
    const BeatDetector = ({ audioRef, gameId, onBeat }) => {
      const lastBeatTime = useRef(0);
      const lastVolume = useRef(0);
      const animationFrameRef = useRef(null);
    
      // Simple beat detection based on volume changes
      useEffect(() => {
        let isActive = true;
    
        const detectBeat = () => {
          if (!isActive || !audioRef.current) return;
    
          try {
            // Get current volume level from audio element
            const currentVolume = audioRef.current.volume * audioRef.current.playbackRate;
            const now = Date.now();
            
            // Detect sudden volume increases as beats
            if (currentVolume > lastVolume.current * 1.1 && now - lastBeatTime.current > 300) {
              lastBeatTime.current = now;
              onBeat();
            }
            
            lastVolume.current = currentVolume;
            animationFrameRef.current = requestAnimationFrame(detectBeat);
          } catch (error) {
            console.warn("Beat detection error:", error);
          }
        };
    
        detectBeat();
    
        return () => {
          isActive = false;
          if (animationFrameRef.current) {
            cancelAnimationFrame(animationFrameRef.current);
          }
        };
      }, [onBeat]);
    
      // Trigger beats on regular intervals as fallback
      useEffect(() => {
        const interval = setInterval(() => {
          const now = Date.now();
          if (now - lastBeatTime.current > 500) { // Fallback beat every 500ms
            lastBeatTime.current = now;
            onBeat();
          }
        }, 500);
    
        return () => clearInterval(interval);
      }, [onBeat]);
    
      return null;
    };

    // Floating icon component

      const [position, setPosition] = useState(startPosition);
      const [rotation, setRotation] = useState(0);
      const [isVisible, setIsVisible] = useState(true);
      
      useEffect(() => {
        // Random rotation between min and max values
        const maxRotation = 30; // Maximum rotation in degrees
        const randomRotation = -maxRotation + Math.random() * (maxRotation * 2);
        setRotation(randomRotation);
        
        // Random horizontal position adjustment (slight drift)
        const horizontalDrift = -10 + Math.random() * 20; // -10px to +10px
        
        // Animation timing
        const animationDuration = 2000 + Math.random() * 1000; // 2-3 seconds
        
        // Start animation
        let animationTimer;
        let startTime = Date.now();
        
        const animate = () => {
          const elapsed = Date.now() - startTime;
          const progress = elapsed / animationDuration;
          
          if (progress < 1) {
            // Parabolic trajectory with slight horizontal drift
            const verticalProgress = Math.sin(progress * Math.PI); // 0 -> 1 -> 0 curve
            const newY = startPosition.y - (verticalProgress * 200); // Up to 200px above starting point
            const newX = startPosition.x + (progress * horizontalDrift);
            
            setPosition({ x: newX, y: newY });
            animationTimer = requestAnimationFrame(animate);
          } else {
            setIsVisible(false);
            setTimeout(() => onAnimationEnd(), 100); // Clean up after animation
          }
        };
        
        animationTimer = requestAnimationFrame(animate);
        
        return () => {
          if (animationTimer) {
            cancelAnimationFrame(animationTimer);
          }
        };
      }, []);
      
      if (!isVisible) return null;
      
      return (
        <div 
          className="absolute z-10 pointer-events-none"
          style={{
            left: `${position.x}px`,
            top: `${position.y}px`,
            transform: `rotate(${rotation}deg)`,

      const onAudioEnded = useCallback(() => {

                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                    <line x1="23" y1="9" x2="17" y2="15"></line>
                    <line x1="17" y1="9" x2="23" y2="15"></line>
                  </svg>
                )}
              </button>
              <input
                type="range"
                min="0"
                max="1"
                step="0.01"
                value={volume}
                onChange={(e) => {
                  const v = parseFloat(e.target.value);
                  setVolume(v);
                  if (v > 0) previousVolumeRef.current = v;
                }}
                className="w-24 md:w-32 h-1 bg-white bg-opacity-20 rounded-full appearance-none cursor-pointer"
              />
            </div>
          </div>
          
          {/* Playlist and Settings Controls */}
          <div className="z-10 flex items-center justify-center space-x-3">
            <button
              onClick={() => setShowPlaylist(!showPlaylist)}
              className={`playlist-btn glass-btn px-5 py-2 rounded-full text-white tracking-wide ${isMobile ? 'text-base' : 'text-sm'}`}
            >
              {showPlaylist ? "Hide Playlist" : "Show Playlist"}
            </button>

            <button
              onClick={() => {
                setBgDimmed(true);
                setTimeout(() => setShowVideo(v => !v), 280);
                setTimeout(() => setBgDimmed(false), 360);
              }}
              className="btn-bounce glass-btn rounded-full flex items-center justify-center text-white"
              title="Toggle Video Background"
              style={{ width: '40px', height: '40px' }}
            >
              <img
                src={showVideo ? "images/icons/icons8-video-call-48.png" : "images/icons/icons8-no-video-48.png"}
                alt={showVideo ? "Video On" : "Video Off"}
                width="20"
                height="20"
                style={{ filter: 'brightness(0) invert(1)' }}
              />
            </button>

            <button
              onClick={() => setShowFloatingIcons(!showFloatingIcons)}
              className="btn-bounce glass-btn rounded-full flex items-center justify-center text-white"
              title="Toggle Floating Icons"
              style={{ width: '40px', height: '40px' }}
            >
              <img
                src={showFloatingIcons ? "images/icons/icons8-happy-48.png" : "images/icons/icons8-no-entry-48.png"}
                alt={showFloatingIcons ? "Floating Icons On" : "Floating Icons Off"}
                width="20"
                height="20"
                style={{ filter: 'brightness(0) invert(1)' }}
              />
            </button>

            <button
              onClick={() => setIsShuffle(!isShuffle)}
              className={`btn-bounce glass-btn rounded-full flex items-center justify-center text-white ${isShuffle ? 'ring-2 ring-white ring-opacity-40' : ''}`}
              title="Toggle Shuffle"
              style={{ width: '40px', height: '40px' }}
            >
              <img
                src={isShuffle ? "images/icons/icons8-shuffle-48.png" : "images/icons/icons8-repeat-48.png"}
                alt={isShuffle ? "Shuffle On" : "Repeat Mode"}
                width="20"
                height="20"
                style={{ filter: 'brightness(0) invert(1)' }}
              />
            </button>
          </div>
          
          {/* Playlist */}
          <div
            ref={playlistRef}
            className={`fixed left-0 right-0 z-20 ${showPlaylist ? 'translate-y-0' : 'translate-y-full'}`}
            style={{
              bottom: '-60px',
              paddingBottom: '60px',
              maxHeight: 'calc(65vh + 60px)',
              background: 'linear-gradient(180deg, rgba(10,10,12,0.85) 0%, rgba(0,0,0,0.92) 100%)',
              backdropFilter: 'blur(28px) saturate(150%)',
              WebkitBackdropFilter: 'blur(28px) saturate(150%)',
              borderTop: '1px solid rgba(255,255,255,0.08)',
              boxShadow: '0 -24px 70px rgba(0,0,0,0.5)',
              borderTopLeftRadius: '24px',
              borderTopRightRadius: '24px',
              transition: 'transform 0.38s cubic-bezier(0.22, 1.2, 0.36, 1)'
            }}
          >
            <div className="w-full max-w-3xl mx-auto p-5 md:p-7">
              {/* Drag handle */}
              <div className="flex justify-center mb-3">
                <div style={{ width: '40px', height: '4px', borderRadius: '999px', background: 'rgba(255,255,255,0.2)' }}></div>
              </div>

              <div className="flex justify-between items-center mb-5">
                <div>
                  <h3 className="text-lg md:text-xl font-semibold text-white tracking-wide">Game Soundtracks</h3>
                  <p className="text-xs text-gray-400 mt-0.5">{completeData.length} tracks · {games.filter(g => completeData.some(t => t.gameId === g.id)).length} games</p>
                </div>
                <button
                  onClick={() => setShowPlaylist(false)}
                  className="btn-bounce glass-btn text-white p-2 rounded-full"
                  aria-label="Close playlist"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                  </svg>
                </button>
              </div>

              <div className="overflow-y-auto custom-scrollbar pr-2" style={{maxHeight: 'calc(65vh - 130px)'}}>
                {(() => {
                  // Group tracks by game, preserving game order
                  const grouped = [];
                  const seenGames = new Set();
                  completeData.forEach(track => {
                    if (!seenGames.has(track.gameId)) {
                      seenGames.add(track.gameId);
                      grouped.push({
                        game: track.game,
                        tracks: completeData.filter(t => t.gameId === track.gameId)
                      });
                    }
                  });

                  let rowIdx = 0;
                  return grouped.map((group, groupIdx) => (
                    <div key={group.game.id}>
                      <div className="playlist-group-header flex items-center gap-2">
                        <span>{group.game.title}</span>
                        <span style={{ flex: 1, height: '1px', background: 'rgba(255,255,255,0.08)' }}></span>
                        <span style={{ opacity: 0.7 }}>{group.tracks.length}</span>
                      </div>
                      <ul>
                        {group.tracks.map((track) => {
                          const isCurrent = currentTrack.id === track.id;
                          const myIdx = rowIdx++;
                          return (
                            <li
                              key={track.id}
                              className={`playlist-row flex items-center pl-4 pr-3 py-2.5 rounded-xl mb-1 cursor-pointer
                                        ${isCurrent ? 'is-current' : ''}
                                        ${showPlaylist ? 'row-in' : ''}`}
                              style={showPlaylist ? { animationDelay: `${Math.min(myIdx, 10) * 15}ms` } : undefined}
                              onClick={() => handleTrackChange(track, 'forward')}
                            >
                              <img
                                src={track.game.coverArt}
                                alt=""
                                className="w-11 h-11 object-cover rounded-lg mr-4"
                                style={{ boxShadow: '0 2px 8px rgba(0,0,0,0.4)' }}
                              />
                              <div className="min-w-0 flex-1">
                                <h4 className={`font-medium truncate ${isCurrent ? 'text-white' : 'text-gray-100'}`} style={{ fontSize: '0.95rem' }}>
                                  {track.title}
                                </h4>
                                <a
                                  href={track.composer.url}
                                  onClick={(e) => e.stopPropagation()}
                                  className="text-xs text-gray-500 hover:text-white transition-colors hover:underline"
                                >
                                  {track.composer.name}
                                </a>
                              </div>
                              <div className="ml-3 flex items-center justify-center" style={{ width: '28px', height: '28px' }}>
                                {isCurrent ? (
                                  isLoading ? (
                                    <LoadingThrobber size={14} />
                                  ) : isPlaying ? (
                                    <div className="flex items-end space-x-0.5" style={{ height: '20px' }}>
                                      <div className="w-0.5 bg-white spectrum-bar1"></div>
                                      <div className="w-0.5 bg-white spectrum-bar2"></div>
                                      <div className="w-0.5 bg-white spectrum-bar3"></div>
                                    </div>
                                  ) : (
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                                  )
                                ) : null}
                              </div>
                            </li>
                          );
                        })}
                      </ul>
                    </div>
                  ));
                })()}
              </div>
            </div>
          </div>

          {/* Beat Detector */}
          {isPlaying && !isLoading && showFloatingIcons && (
            <BeatDetector
              audioRef={audioRef}
              gameId={currentTrack.gameId}
              onBeat={handleBeat}
            />
          )}
          
          {/* Floating Icons */}
          {showFloatingIcons && floatingIcons.map(item => (
            <FloatingIcon
              key={item.id}
              icon={item.icon}
              startPosition={item.position}
              onAnimationEnd={() => removeIcon(item.id)}
            />
          ))}
        </div>
      );
    };

    // Function to update URL with the current song ID
    const updateURLWithSongId = (songId) => {
      const url = new URL(window.location);
      url.hash = `song=${songId}`;
      window.history.replaceState({}, '', url);
    };

    // Function to get song ID from URL hash
    const getSongIdFromURL = () => {
      const hash = window.location.hash;
      if (hash && hash.includes('song=')) {
        return hash.split('song=')[1];
      }
      return null;
    };

    // Inside the UnSAMEMusicPlayer component, make these modifications:

    // Render the app
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<UnSAMEMusicPlayer />);
  </script>
</body>
</html>
